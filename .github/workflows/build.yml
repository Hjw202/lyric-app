name: Build lyric-app

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-arm64:
    name: Build ARM64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binary in ARM64 container
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t lyric-builder-arm64 \
            -f Dockerfile.arm64 .

          docker create --name temp-arm64 lyric-builder-arm64
          mkdir -p dist
          docker cp temp-arm64:/app/dist/lyric_app dist/lyric_app_arm64
          docker rm temp-arm64

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyric_app_arm64
          path: dist/lyric_app_arm64

  build-armhf:
    name: Build ARMHF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binary in ARMHF container
        run: |
          docker buildx build \
            --platform linux/arm/v7 \
            --load \
            -t lyric-builder-armhf \
            -f Dockerfile.armhf .

          docker create --name temp-armhf lyric-builder-armhf
          mkdir -p dist
          docker cp temp-armhf:/app/dist/lyric_app dist/lyric_app_armhf
          docker rm temp-armhf

      - name: Upload ARMHF artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyric_app_armhf
          path: dist/lyric_app_armhf

  release:
    name: Create Release
    needs: [build-arm64, build-armhf]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Package release
        run: |
          chmod +x lyric_app_arm64/lyric_app_arm64
          chmod +x lyric_app_armhf/lyric_app_armhf

          # ARM64 包
          mkdir -p release-arm64
          cd release-arm64
          cp ../lyric_app_arm64/lyric_app_arm64 .
          cp ../config/config.json .
          cp ../install.sh .
          cp -r ../systemd .
          tar -czf ../lyric-app-${{ github.ref_name }}-arm64.tar.gz *
          cd ..

          # ARMHF 包
          mkdir -p release-armhf
          cd release-armhf
          cp ../lyric_app_armhf/lyric_app_armhf lyric_app
          cp ../config/config.json .
          cp ../install.sh .
          cp -r ../systemd .
          tar -czf ../lyric-app-${{ github.ref_name }}-armhf.tar.gz *
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lyric-app-${{ github.ref_name }}-arm64.tar.gz
            lyric-app-${{ github.ref_name }}-armhf.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
