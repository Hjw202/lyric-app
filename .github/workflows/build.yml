  release:
    name: Create Release
    needs: [build-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Package release
        run: |
          chmod +x lyric_app_arm64/lyric_app_arm64

          # ARM64 包
          mkdir -p release-arm64
          cd release-arm64
          cp ../lyric_app_arm64/lyric_app_arm64 ./lyric_app
          cp ../install.sh .
          cp -r ../config .
          cp -r ../systemd .
          cp -r ../scripts .
          tar -czf ../lyric-app-${{ github.ref_name }}-arm64.tar.gz *
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lyric-app-${{ github.ref_name }}-arm64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
