name: Build lyric-app

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-arm64:
    name: Build ARM64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binary in ARM64 container
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t lyric-builder-arm64 \
            -f Dockerfile.arm64 .

          docker create --name temp-arm64 lyric-builder-arm64
          mkdir -p dist
          docker cp temp-arm64:/app/dist/lyric_app dist/lyric_app_arm64
          docker rm temp-arm64

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyric_app_arm64
          path: dist/lyric_app_arm64

  release:
    name: Create Release
    needs: [build-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Package release
        run: |
          chmod +x lyric_app_arm64/lyric_app_arm64

          # ARM64 包
          mkdir -p release
          cd release
          cp ../lyric_app_arm64/lyric_app_arm64 .
          cp ../config/config.json .
          cp ../install.sh .
          cp -r ../systemd .
          tar -czf ../lyric-app-${{ github.ref_name }}-arm64.tar.gz *
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lyric-app-${{ github.ref_name }}-arm64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
