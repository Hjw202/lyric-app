# BlueZ 主配置 - 蓝牙歌词音箱
# 部署到: /etc/bluetooth/main.conf

[General]
# 设备名称（手机搜索蓝牙时显示的名称）
Name = Lyric Speaker

# 设备类型: 音频/视频 + 扬声器 (A2DP Sink)
# 0x240438 = Audio service + Rendering service + Audio/Video major + Loudspeaker minor
Class = 0x240438

# 始终可被发现（手机搜索时能找到设备）
DiscoverableTimeout = 0

# 始终可配对
PairableTimeout = 0

# 快速连接（减少音频中断）
FastConnectable = true

# 启用实验性功能（部分 A2DP 特性需要）
Experimental = true

# 重新连接策略：自动重连上次连接的设备
ReconnectUUIDs = 0000110A-0000-1000-8000-00805F9B34FB,0000110B-0000-1000-8000-00805F9B34FB,0000110E-0000-1000-8000-00805F9B34FB
AutoReconnect = true

[Policy]
# 自动启用蓝牙控制器（开机后自动 power on）
AutoEnable = true

# A2DP 优先于 HFP/HSP（音质优先）
# GitHub issue: 部分 BlueZ 版本需要此设置才能正确协商 A2DP sink
